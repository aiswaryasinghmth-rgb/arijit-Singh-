<html>
    <head>
        <title>Arijit Card</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }
            body{
                background: cream;
                width: 100vw;
                height: 100vh;
                display: grid;
                place-content: center;
            }
            div {
                background-color: cherry blossom;
                width: 300px;
                border-radius: 20px;
                text-align: center;
            }
            img {
                width: 300px;
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
            
            }
            a {
                font-size: 20px;
                background-color: lightpink;
                display: block;
                margin: 10px;
                padding: 10px;
                border-radius: 15px;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div>
            <img src="/arijit.jpg" alt="Arijit singh">
            <a href="https://instagram.com/@arijitsingh"> Arijit Singh ki awaaz sirf gaane nahi gaati,
wo chupke se dil ke adhoore ehsaas bhi suna jaati hai. </a>
        
        </div>
    </body>
</html>
